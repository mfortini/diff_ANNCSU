define({id: "5162dd65", inputs: ["d3"], outputs: ["formatNumber","downloadCSV"], body: (d3) => {
const formatNumber = (value) => {
  const n = Number(value);
  if (!Number.isFinite(n)) return value ?? "-";
  return Number.isInteger(n) ? d3.format(",")(n) : d3.format(",.5f")(n);
};

function downloadCSV(rows, filename) {
  if (!rows?.length) return;
  const cols = Object.keys(rows[0]);
  const escape = (value) => {
    const s = value == null ? "" : String(value);
    return s.includes(",") || s.includes('"') || s.includes("\n")
      ? `"${s.replace(/"/g, '""')}"`
      : s;
  };
  const csv = [cols.join(","), ...rows.map((row) => cols.map((col) => escape(row[col])).join(","))].join("\n");
  const blob = new Blob([csv], {type: "text/csv"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}
return {formatNumber,downloadCSV};
}});

define({id: "2144cde1", inputs: ["filteredCells","html","display","maplibregl","gridPointsPmtilesUrl","hotspotState","d3","invalidation"], body: async (filteredCells,html,display,maplibregl,gridPointsPmtilesUrl,hotspotState,d3,invalidation) => {
if (filteredCells.length) {
  const wrapper = html`<div style="position:relative;height:560px;border:1px solid #d4d4d8;border-radius:8px;overflow:hidden;background:#fff"></div>`;
  const banner = html`<div style="position:absolute;left:12px;top:12px;z-index:2;max-width:min(520px,calc(100% - 24px));padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.94);box-shadow:0 8px 24px rgba(15,23,42,0.14);backdrop-filter:blur(6px);font:12px/1.4 sans-serif;color:#111827">
    <strong>Nessuna cella selezionata</strong><br>
    <span style="color:#4b5563">Clicca un punto o una riga della tabella per vedere il dettaglio qui.</span>
  </div>`;
  const container = html`<div style="position:absolute;inset:0"></div>`;
  wrapper.append(banner, container);
  display(wrapper);
  await new Promise(requestAnimationFrame);
  const normalizeIstat = (v) => String(v ?? "").padStart(6, "0");
  const rows = filteredCells
    .map((d) => {
      const lon = Number(d.center_lon);
      const lat = Number(d.center_lat);
      if (!Number.isFinite(lon) || !Number.isFinite(lat)) return null;
      return {
        ...d,
        center_lon: lon,
        center_lat: lat,
        point_count: Number(d.point_count) || 0,
        row_key: `${normalizeIstat(d.codice_istat)}:${d.cell_id}`
      };
    })
    .filter(Boolean);
  const rowByKey = new Map(rows.map((row) => [row.row_key, row]));
  const rowKeys = rows.map((row) => row.row_key);
  const pointFilter = rowKeys.length === 0
    ? ["literal", false]
    : rowKeys.length === 1
      ? ["==", ["get", "row_key"], rowKeys[0]]
      : ["any", ...rowKeys.map((rowKey) => ["==", ["get", "row_key"], rowKey])];

  const map = new maplibregl.Map({
    container,
    center: [12.5, 42.5],
    zoom: 5,
    minZoom: 4,
    maxZoom: 20,
    style: {
      version: 8,
      sources: {
        osm: {
          type: "raster",
          tiles: ["https://a.tile.openstreetmap.org/{z}/{x}/{y}.png"],
          tileSize: 256,
          attribution: "&copy; OpenStreetMap contributors",
          maxzoom: 19
        },
        gridPoints: {
          type: "vector",
          url: `pmtiles://${gridPointsPmtilesUrl}`
        }
      },
      layers: [
        {id: "osm", type: "raster", source: "osm"},
        {
          id: "grid-points",
          type: "circle",
          source: "gridPoints",
          "source-layer": "grid_points",
          filter: pointFilter,
          paint: {
            "circle-color": "#ea580c",
            "circle-radius": ["interpolate", ["linear"], ["zoom"], 5, 1.2, 10, 1.6, 14, 2.2, 18, 3.0],
            "circle-opacity": 0.45,
            "circle-stroke-color": "#111827",
            "circle-stroke-width": ["interpolate", ["linear"], ["zoom"], 5, 0.2, 14, 0.5, 18, 0.8]
          }
        }
      ]
    }
  });
  await new Promise((resolve) => map.once("load", resolve));

  hotspotState.map = map;
  hotspotState.panel = banner;
  const hoverPopup = new maplibregl.Popup({closeButton: false, closeOnClick: false, offset: 10});

  hotspotState.focus = (properties) => {
    if (!hotspotState.map || !properties) return;
    const lon = Number(properties.center_lon);
    const lat = Number(properties.center_lat);
    if (!Number.isFinite(lon) || !Number.isFinite(lat)) return;
    hotspotState.map.flyTo({center: [lon, lat], zoom: 20, duration: 800});
    if (hotspotState.panel) {
      hotspotState.panel.innerHTML = `
        <strong>${properties.comune} (${properties.pro_com})</strong><br>
        ISTAT: ${properties.codice_istat ?? "-"}<br>
        Punti: ${d3.format(",")(Number(properties.point_count) || 0)}<br>
        Cella: ${properties.cell_id}<br>
        Regola: ${properties.anomaly_rule}<br>
        P99: ${properties.global_p99 ?? "-"}<br>
        Lon/Lat: ${lon.toFixed(6)}, ${lat.toFixed(6)}
      `;
    }
  };

  if (rows.length) {
    const bounds = rows.reduce((acc, row) => {
      acc.extend([row.center_lon, row.center_lat]);
      return acc;
    }, new maplibregl.LngLatBounds([rows[0].center_lon, rows[0].center_lat], [rows[0].center_lon, rows[0].center_lat]));
    map.fitBounds(bounds, {padding: 40, maxZoom: 13});
  }

  map.on("mouseenter", "grid-points", () => {
    map.getCanvas().style.cursor = "pointer";
  });
  map.on("mouseleave", "grid-points", () => {
    map.getCanvas().style.cursor = "";
    hoverPopup.remove();
  });
  map.on("mousemove", "grid-points", (event) => {
    const feature = event.features?.[0];
    const row = rowByKey.get(feature?.properties?.row_key);
    if (!row) return;
    hoverPopup
      .setLngLat(event.lngLat)
      .setHTML(`<strong>${row.comune}</strong><br><small>Cella ${row.cell_id}, ${d3.format(",")(Number(row.point_count) || 0)} punti</small>`)
      .addTo(map);
  });
  map.on("click", "grid-points", (event) => {
    const feature = event.features?.[0];
    const row = rowByKey.get(feature?.properties?.row_key);
    if (row) hotspotState.focus(row);
  });

  invalidation.then(() => {
    hoverPopup.remove();
    hotspotState.panel = null;
    hotspotState.map = null;
    map.remove();
  });
}
}});

define({id: "a07197f9", inputs: ["filteredCells","Inputs","formatNumber","hotspotState","display"], body: (filteredCells,Inputs,formatNumber,hotspotState,display) => {
{
  const rowsByKey = new Map(filteredCells.map((row) => [`${row.codice_istat}:${row.cell_id}`, row]));
  const table = Inputs.table(filteredCells, {
    select: false,
    rows: 20,
    sort: "point_count",
    reverse: true,
    columns: [
      "point_count",
      "comune",
      "codice_istat",
      "pro_com",
      "regione",
      "cell_id",
      "global_p99",
      "absolute_min_points",
      "anomaly_rule",
      "center_lon",
      "center_lat"
    ],
    header: {
      point_count: "Punti",
      comune: "Comune",
      codice_istat: "Codice ISTAT",
      pro_com: "PRO_COM",
      regione: "Regione",
      cell_id: "Cella",
      global_p99: "P99 globale",
      absolute_min_points: "Soglia assoluta",
      anomaly_rule: "Regola",
      center_lon: "Lon",
      center_lat: "Lat"
    },
    format: {
      point_count: formatNumber,
      pro_com: formatNumber,
      global_p99: formatNumber,
      absolute_min_points: formatNumber,
      center_lon: formatNumber,
      center_lat: formatNumber
    },
    align: {
      point_count: "right",
      comune: "left",
      codice_istat: "left",
      pro_com: "right",
      regione: "left",
      cell_id: "left",
      global_p99: "right",
      absolute_min_points: "right",
      anomaly_rule: "left",
      center_lon: "right",
      center_lat: "right"
    }
  });

  let activeRow = null;
  const tbody = table.querySelector("tbody");
  const focusRow = (tr, row) => {
    if (activeRow) activeRow.style.background = "";
    activeRow = tr;
    activeRow.style.background = "#fff7ed";
    hotspotState.focus(row);
  };
  tbody.addEventListener("click", (event) => {
    const tr = event.target?.closest?.("tr");
    if (!tr) return;
    const cells = Array.from(tr.children);
    const codiceIstat = cells[3]?.textContent?.trim();
    const cellId = cells[6]?.textContent?.trim();
    const row = rowsByKey.get(`${codiceIstat}:${cellId}`);
    if (!row) return;
    focusRow(tr, row);
  });
  tbody.addEventListener("mouseover", (event) => {
    const tr = event.target?.closest?.("tr");
    if (tr && tr !== activeRow) tr.style.background = "#fafaf9";
  });
  tbody.addEventListener("mouseout", (event) => {
    const tr = event.target?.closest?.("tr");
    if (tr && tr !== activeRow) tr.style.background = "";
  });
  display(table);
}
}});
