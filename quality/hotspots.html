define({id: "2f6cbc83", inputs: ["d3"], outputs: ["formatNumber","downloadCSV","distanceMeters"], body: (d3) => {
const formatNumber = (value) => {
  const n = Number(value);
  if (!Number.isFinite(n)) return value ?? "-";
  return Number.isInteger(n) ? d3.format(",")(n) : d3.format(",.5f")(n);
};

function downloadCSV(rows, filename) {
  if (!rows?.length) return;
  const cols = Object.keys(rows[0]);
  const escape = (value) => {
    const s = value == null ? "" : String(value);
    return s.includes(",") || s.includes('"') || s.includes("\n")
      ? `"${s.replace(/"/g, '""')}"`
      : s;
  };
  const csv = [cols.join(","), ...rows.map((row) => cols.map((col) => escape(row[col])).join(","))].join("\n");
  const blob = new Blob([csv], {type: "text/csv"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

function distanceMeters(aLon, aLat, bLon, bLat) {
  const toRad = (deg) => deg * Math.PI / 180;
  const R = 6371000;
  const dLat = toRad(bLat - aLat);
  const dLon = toRad(bLon - aLon);
  const lat1 = toRad(aLat);
  const lat2 = toRad(bLat);
  const sinLat = Math.sin(dLat / 2);
  const sinLon = Math.sin(dLon / 2);
  const h = sinLat * sinLat + Math.cos(lat1) * Math.cos(lat2) * sinLon * sinLon;
  return 2 * R * Math.asin(Math.min(1, Math.sqrt(h)));
}
return {formatNumber,downloadCSV,distanceMeters};
}});

define({id: "ca0881bf", inputs: ["gridQuality","dbscan"], outputs: ["topCells10m","fallbackTopCells10m","gridRows","dbscanRows"], body: (gridQuality,dbscan) => {

const fallbackTopCells10m = Array.isArray(gridQuality.top_cells)

  : [];
const gridRows = (topCells10m.length ? topCells10m : fallbackTopCells10m).map((d) => ({

  comune: d.comune,

  source: "DBSCAN",

  pro_com: d.pro_com,

  absolute_min_points: null,
  anomaly_rule: null
}));
return {topCells10m,fallbackTopCells10m,gridRows,dbscanRows};
}});

define({id: "9a716c30", inputs: ["gridRows","dbscanRows","distanceMeters"], outputs: ["mergedHotspots"], body: (gridRows,dbscanRows,distanceMeters) => {
const mergedHotspots = (() => {
  const DUPLICATE_DISTANCE_METERS = 25;
  const candidates = [...gridRows, ...dbscanRows]
    .filter((row) => Number.isFinite(row.center_lon) && Number.isFinite(row.center_lat))
    .sort((a, b) => b.point_count - a.point_count);

  const merged = [];

  for (const row of candidates) {
    const existing = merged.find((entry) =>
      entry.codice_istat === row.codice_istat &&
      distanceMeters(entry.center_lon, entry.center_lat, row.center_lon, row.center_lat) <= DUPLICATE_DISTANCE_METERS
    );

    if (!existing) {
      merged.push({
        ...row,
        sources: new Set([row.source])
      });
      continue;
    }

    existing.sources.add(row.source);

    if (row.point_count > existing.point_count) {
      existing.source = row.source;
      existing.comune = row.comune;
      existing.pro_com = row.pro_com;
      existing.regione = row.regione;
      existing.center_lon = row.center_lon;
      existing.center_lat = row.center_lat;
      existing.point_count = row.point_count;
      existing.global_p99 = row.global_p99;
      existing.absolute_min_points = row.absolute_min_points;
      existing.anomaly_rule = row.anomaly_rule;
      existing.min_lon = row.min_lon;
      existing.min_lat = row.min_lat;
      existing.max_lon = row.max_lon;
      existing.max_lat = row.max_lat;
    }

    if (!existing.grid_cell_id && row.grid_cell_id) existing.grid_cell_id = row.grid_cell_id;
    if (!existing.dbscan_cluster_id && row.dbscan_cluster_id != null) existing.dbscan_cluster_id = row.dbscan_cluster_id;
  }

  return merged
    .map((row, index) => ({
      row_id: `${row.codice_istat}:${index}`,
      fonte: Array.from(row.sources).sort().join(" + "),
      fonte_label: row.sources.size === 2 ? "Entrambi" : Array.from(row.sources)[0],
      comune: row.comune,
      codice_istat: row.codice_istat,
      regione: row.regione,
      point_count: row.point_count,
      grid_cell_id: row.grid_cell_id,
      dbscan_cluster_id: row.dbscan_cluster_id,
      global_p99: row.global_p99,
      absolute_min_points: row.absolute_min_points,
      anomaly_rule: row.anomaly_rule,
      min_lon: row.min_lon,
      min_lat: row.min_lat,
      max_lon: row.max_lon,
      max_lat: row.max_lat,
      center_lon: row.center_lon,
      center_lat: row.center_lat
    }))
    .sort((a, b) => b.point_count - a.point_count);
})();
return {mergedHotspots};
}});

define({id: "9f38b389", inputs: ["mergedHotspots","html","display","maplibregl","hotspotsPmtilesUrl","d3","invalidation"], body: async (mergedHotspots,html,display,maplibregl,hotspotsPmtilesUrl,d3,invalidation) => {
if (mergedHotspots.length) {
  const wrapper = html`<div style="position:relative;height:560px;border:1px solid #d4d4d8;border-radius:8px;overflow:hidden;background:#fff"></div>`;
  const banner = html`<div style="position:absolute;left:12px;top:12px;z-index:2;max-width:min(520px,calc(100% - 24px));padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.94);box-shadow:0 8px 24px rgba(15,23,42,0.14);backdrop-filter:blur(6px);font:12px/1.4 sans-serif;color:#111827">
    <strong>Nessun hotspot selezionato</strong><br>
    <span style="color:#4b5563">Clicca un punto in mappa o una riga della tabella per vedere il dettaglio qui.</span>
  </div>`;
  const container = html`<div style="position:absolute;inset:0"></div>`;
  wrapper.append(banner, container);
  display(wrapper);
  await new Promise(requestAnimationFrame);

  const rows = mergedHotspots.filter((row) => Number.isFinite(row.center_lon) && Number.isFinite(row.center_lat));
  const map = new maplibregl.Map({
    container,
    center: [12.5, 42.5],
    zoom: 5,
    minZoom: 4,
    maxZoom: 20,
    style: {
      version: 8,
      sources: {
        osm: {
          type: "raster",
          tiles: ["https://a.tile.openstreetmap.org/{z}/{x}/{y}.png"],
          tileSize: 256,
          attribution: "&copy; OpenStreetMap contributors",
          maxzoom: 19
        },
        hotspots: {
          type: "vector",
          url: `pmtiles://${hotspotsPmtilesUrl}`
        },
        hotspotCenters: {
          type: "geojson",
          data: {
            type: "FeatureCollection",
            features: rows.map((row) => ({
              type: "Feature",
              geometry: {type: "Point", coordinates: [row.center_lon, row.center_lat]},
              properties: row
            }))
          }
        }
      },
      layers: [
        {id: "osm", type: "raster", source: "osm"},
        {
          id: "hotspots-points",
          type: "circle",
          source: "hotspots",
          "source-layer": "hotspots_points",
          paint: {
            "circle-color": [
              "match",
              ["get", "source_method"],
              "DBSCAN", "#0f766e",
              "Grid 10m", "#ea580c",
              "#7c3aed"
            ],
            "circle-radius": ["interpolate", ["linear"], ["zoom"], 5, 1.2, 10, 1.8, 14, 2.4, 18, 3.2, 20, 4],
            "circle-opacity": 0.5,
            "circle-stroke-color": "#111827",
            "circle-stroke-width": 0.4
          }
        },
        {
          id: "hotspot-centers",
          type: "circle",
          source: "hotspotCenters",
          maxzoom: 16,
          paint: {
            "circle-color": [
              "match",
              ["get", "fonte_label"],
              "DBSCAN", "#0f766e",
              "Grid 10m", "#ea580c",
              "#7c3aed"
            ],
            "circle-radius": ["interpolate", ["linear"], ["zoom"], 5, 4, 10, 5.5, 14, 7, 18, 8.5],
            "circle-opacity": 0.9,
            "circle-stroke-color": "#ffffff",
            "circle-stroke-width": 1.2
          }
        }
      ]
    }
  });
  await new Promise((resolve) => map.once("load", resolve));

  const hoverPopup = new maplibregl.Popup({closeButton: false, closeOnClick: false, offset: 10});
  const renderBanner = (row) => {
    banner.innerHTML = `
      <strong>${row.comune}</strong><br>
      Fonte: ${row.fonte}<br>
      ISTAT: ${row.codice_istat}<br>
      Punti: ${d3.format(",")(Number(row.point_count) || 0)}<br>
      Lon/Lat: ${Number(row.center_lon).toFixed(6)}, ${Number(row.center_lat).toFixed(6)}
    `;
  };
  const clusterFilter = (row) => {
    const filters = [];
    if (row.grid_cell_id) filters.push(["==", ["get", "grid_cell_id"], row.grid_cell_id]);
    if (row.dbscan_cluster_id != null && row.dbscan_cluster_id !== "") filters.push(["==", ["get", "dbscan_cluster_id"], String(row.dbscan_cluster_id)]);
    if (filters.length === 0) return null;
    return filters.length === 1 ? filters[0] : ["any", ...filters];
  };
  const fitClusterBounds = (row) => {
    const filter = clusterFilter(row);
    if (!filter) return false;
    const features = map.querySourceFeatures("hotspots", {
      sourceLayer: "hotspots_points",
      filter
    });
    const coords = features
      .map((feature) => feature.geometry?.coordinates)
      .filter((coords) => Array.isArray(coords) && Number.isFinite(coords[0]) && Number.isFinite(coords[1]));
    if (!coords.length) return false;
    const bounds = coords.reduce((acc, coords) => {
      acc.extend(coords);
      return acc;
    }, new maplibregl.LngLatBounds(coords[0], coords[0]));
    map.fitBounds(bounds, {padding: 36, maxZoom: 20, duration: 800});
    return true;
  };
  const focusRow = (row) => {
    renderBanner(row);
    if (
      Number.isFinite(row.min_lon) &&
      Number.isFinite(row.min_lat) &&
      Number.isFinite(row.max_lon) &&
      Number.isFinite(row.max_lat) &&
      row.max_lon > row.min_lon &&
      row.max_lat > row.min_lat
    ) {
      map.fitBounds([[row.min_lon, row.min_lat], [row.max_lon, row.max_lat]], {padding: 36, maxZoom: 20, duration: 800});
      return;
    }
    map.flyTo({center: [row.center_lon, row.center_lat], zoom: 20, duration: 0});
    map.once("idle", () => {
      if (!fitClusterBounds(row)) {
        map.flyTo({center: [row.center_lon, row.center_lat], zoom: 20, duration: 800});
      }
    });
  };

  const bounds = rows.reduce((acc, row) => {
    acc.extend([row.center_lon, row.center_lat]);
    return acc;
  }, new maplibregl.LngLatBounds([rows[0].center_lon, rows[0].center_lat], [rows[0].center_lon, rows[0].center_lat]));
  map.fitBounds(bounds, {padding: 40, maxZoom: 13});

  map.on("mouseenter", "hotspot-centers", () => {
    map.getCanvas().style.cursor = "pointer";
  });
  map.on("mouseleave", "hotspot-centers", () => {
    map.getCanvas().style.cursor = "";
    hoverPopup.remove();
  });
  map.on("mousemove", "hotspot-centers", (event) => {
    const properties = event.features?.[0]?.properties;
    if (!properties) return;
    hoverPopup
      .setLngLat(event.lngLat)
      .setHTML(`<strong>${properties.comune}</strong><br><small>${properties.fonte_label}, ${d3.format(",")(Number(properties.point_count) || 0)} punti</small>`)
      .addTo(map);
  });
  map.on("click", "hotspot-centers", (event) => {
    const properties = event.features?.[0]?.properties;
    if (!properties) return;
    focusRow({
      ...properties,
      point_count: Number(properties.point_count) || 0,
      center_lon: Number(properties.center_lon),
      center_lat: Number(properties.center_lat)
    });
  });

  window.__anncsuUnifiedHotspotsFocus = focusRow;

  invalidation.then(() => {
    hoverPopup.remove();
    if (window.__anncsuUnifiedHotspotsFocus === focusRow) window.__anncsuUnifiedHotspotsFocus = null;
    map.remove();
  });
}
}});

define({id: "72e86d7f", inputs: ["html","display","Inputs","mergedHotspots","formatNumber","MutationObserver","invalidation"], body: async (html,display,Inputs,mergedHotspots,formatNumber,MutationObserver,invalidation) => {

  const style = html`<style>

      min-width: 88px;
      max-width: 88px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>`;
  display(style);

  const table = Inputs.table(mergedHotspots, {
    select: false,
    rows: 20,
    sort: "point_count",
    reverse: true,
    columns: [
      "fonte_label",
      "point_count",
      "comune",
      "codice_istat",
      "regione",
      "center_lon",
      "center_lat"
    ],
    header: {
      fonte_label: "Fonte",
      point_count: "Punti",
      comune: "Comune",
      codice_istat: "Codice ISTAT",
      regione: "Regione",
      center_lon: "Lon",
      center_lat: "Lat"
    },
    format: {
      point_count: formatNumber,
      center_lon: formatNumber,
      center_lat: formatNumber
    },
    align: {
      fonte_label: "left",
      point_count: "right",
      comune: "left",
      codice_istat: "left",
      regione: "left",
      center_lon: "right",
      center_lat: "right"
    }
  });
  const wrapper = html`<div class="hotspots-unified-table"></div>`;
  wrapper.append(table);
  display(wrapper);
  await new Promise(requestAnimationFrame);

  let activeRow = null;
  const tbody = table.querySelector("tbody");
  if (tbody) {
    const sortedRows = [...mergedHotspots].sort((a, b) => b.point_count - a.point_count);
    const tagAllTrs = () => {
      Array.from(tbody.querySelectorAll("tr")).forEach((tr, i) => {
        if (sortedRows[i]) tr._hotspotRow = sortedRows[i];
      });
    };
    tagAllTrs();
    const observer = new MutationObserver(tagAllTrs);
    observer.observe(tbody, {childList: true, subtree: false});
    invalidation.then(() => observer.disconnect());
    tbody.addEventListener("click", (event) => {
      const tr = event.target?.closest?.("tr");
      if (!tr || !tr._hotspotRow) return;
      const row = tr._hotspotRow;
      if (activeRow) activeRow.style.background = "";
      activeRow = tr;
      activeRow.style.background = "#fff7ed";
      window.__anncsuUnifiedHotspotsFocus?.(row);
    });
  }
}
}});
